<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="watermarkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#watermarkGrad)"/>
  <g transform="translate(400, 200)">
    <!-- Shield Icon -->
    <path d="M 0 -80 L 60 -60 L 60 0 C 60 40 30 70 0 90 C -30 70 -60 40 -60 0 L -60 -60 Z" fill="white" opacity="0.9"/>
    <!-- Check mark inside shield -->
    <path d="M -20 0 L -5 20 L 30 -20" stroke="url(#watermarkGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Watermark text pattern -->
    <text x="-120" y="80" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.4">© BRAND</text>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="20" fill="white" opacity="0.4">© BRAND</text>
  </g>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Content Protection</text>
</svg>
