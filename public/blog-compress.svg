<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="compressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#compressGrad)"/>
  <g transform="translate(400, 200)">
    <!-- Large file -->
    <rect x="-100" y="-60" width="80" height="100" rx="4" fill="white" opacity="0.9"/>
    <rect x="-90" y="-50" width="15" height="15" fill="url(#compressGrad)" opacity="0.6"/>
    <rect x="-90" y="-30" width="60" height="4" fill="url(#compressGrad)" opacity="0.4"/>
    <rect x="-90" y="-20" width="60" height="4" fill="url(#compressGrad)" opacity="0.4"/>
    <rect x="-90" y="-10" width="40" height="4" fill="url(#compressGrad)" opacity="0.4"/>
    <text x="-60" y="65" font-family="monospace" font-size="14" fill="white">500MB</text>
    
    <!-- Arrow -->
    <path d="M -5 0 L 15 0 L 10 -8 M 15 0 L 10 8" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Small file -->
    <rect x="30" y="-40" width="60" height="70" rx="4" fill="white" opacity="0.9"/>
    <rect x="38" y="-32" width="12" height="12" fill="url(#compressGrad)" opacity="0.6"/>
    <rect x="38" y="-16" width="44" height="3" fill="url(#compressGrad)" opacity="0.4"/>
    <rect x="38" y="-10" width="44" height="3" fill="url(#compressGrad)" opacity="0.4"/>
    <rect x="38" y="-4" width="30" height="3" fill="url(#compressGrad)" opacity="0.4"/>
    <text x="60" y="55" font-family="monospace" font-size="14" fill="white">50MB</text>
  </g>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Video Compression</text>
</svg>
