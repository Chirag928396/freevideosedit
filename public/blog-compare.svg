<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="compareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#compareGrad)"/>
  <g transform="translate(400, 185)">
    <!-- Browser window (left) -->
    <rect x="-155" y="-75" width="130" height="100" rx="6" fill="white" opacity="0.9"/>
    <rect x="-155" y="-75" width="130" height="20" rx="6" fill="url(#compareGrad)" opacity="0.5"/>
    <circle cx="-145" cy="-65" r="5" fill="white" opacity="0.8"/>
    <circle cx="-130" cy="-65" r="5" fill="white" opacity="0.8"/>
    <circle cx="-115" cy="-65" r="5" fill="white" opacity="0.8"/>
    <!-- Browser content lines -->
    <rect x="-145" y="-45" width="100" height="7" rx="2" fill="url(#compareGrad)" opacity="0.35"/>
    <rect x="-145" y="-33" width="80" height="5" rx="2" fill="url(#compareGrad)" opacity="0.25"/>
    <rect x="-145" y="-22" width="90" height="5" rx="2" fill="url(#compareGrad)" opacity="0.25"/>
    <rect x="-145" y="-11" width="60" height="5" rx="2" fill="url(#compareGrad)" opacity="0.25"/>
    <text x="-90" y="45" font-family="Arial" font-size="13" fill="url(#compareGrad)" text-anchor="middle">Browser</text>

    <!-- VS text -->
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">VS</text>

    <!-- Desktop monitor (right) -->
    <rect x="25" y="-75" width="130" height="95" rx="6" fill="white" opacity="0.9"/>
    <rect x="25" y="-75" width="130" height="18" rx="6" fill="url(#compareGrad)" opacity="0.5"/>
    <!-- Monitor stand -->
    <rect x="83" y="20" width="14" height="20" rx="2" fill="white" opacity="0.9"/>
    <rect x="68" y="38" width="44" height="7" rx="3" fill="white" opacity="0.9"/>
    <!-- Desktop content lines -->
    <rect x="35" y="-48" width="100" height="7" rx="2" fill="url(#compareGrad)" opacity="0.35"/>
    <rect x="35" y="-36" width="80" height="5" rx="2" fill="url(#compareGrad)" opacity="0.25"/>
    <rect x="35" y="-25" width="90" height="5" rx="2" fill="url(#compareGrad)" opacity="0.25"/>
    <rect x="35" y="-14" width="60" height="5" rx="2" fill="url(#compareGrad)" opacity="0.25"/>
    <text x="90" y="64" font-family="Arial" font-size="13" fill="url(#compareGrad)" text-anchor="middle">Desktop</text>
  </g>
  <text x="400" y="345" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Browser vs Desktop</text>
</svg>
