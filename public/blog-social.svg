<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="socialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#socialGrad)"/>
  <g transform="translate(400, 190)">
    <!-- Phone silhouette -->
    <rect x="-30" y="-90" width="60" height="110" rx="8" fill="white" opacity="0.9"/>
    <rect x="-22" y="-80" width="44" height="70" rx="4" fill="url(#socialGrad)" opacity="0.5"/>
    <circle cx="0" cy="28" r="5" fill="url(#socialGrad)" opacity="0.6"/>
    <!-- Play button on screen -->
    <polygon points="-8,-50 -8,-30 12,-40" fill="white" opacity="0.9"/>
    <!-- Like icon -->
    <path d="M -80 -20 C -80 -30 -70 -35 -65 -25 C -60 -35 -50 -30 -50 -20 C -50 -10 -65 0 -65 0 C -65 0 -80 -10 -80 -20Z" fill="white" opacity="0.8"/>
    <!-- Share arrows -->
    <circle cx="70" cy="-40" r="10" fill="white" opacity="0.7"/>
    <circle cx="90" cy="-15" r="10" fill="white" opacity="0.7"/>
    <circle cx="70" cy="10" r="10" fill="white" opacity="0.7"/>
    <line x1="70" y1="-40" x2="90" y2="-15" stroke="white" stroke-width="3" opacity="0.8"/>
    <line x1="90" y1="-15" x2="70" y2="10" stroke="white" stroke-width="3" opacity="0.8"/>
  </g>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Social Media Video</text>
</svg>
