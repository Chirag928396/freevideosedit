<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="trimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#trimGrad)"/>
  <g transform="translate(400, 200)">
    <!-- Scissors Icon -->
    <path d="M -40 -60 L -20 -40 L -50 -10 L -70 -30 Z" fill="white" opacity="0.9"/>
    <path d="M 40 -60 L 20 -40 L 50 -10 L 70 -30 Z" fill="white" opacity="0.9"/>
    <rect x="-3" y="-40" width="6" height="80" fill="white" opacity="0.9"/>
    <circle cx="-50" cy="-50" r="15" fill="white" opacity="0.8"/>
    <circle cx="50" cy="-50" r="15" fill="white" opacity="0.8"/>
    <!-- Film strip -->
    <rect x="-80" y="40" width="160" height="60" rx="4" fill="white" opacity="0.3"/>
    <rect x="-70" y="48" width="35" height="44" fill="white" opacity="0.6"/>
    <rect x="-25" y="48" width="35" height="44" fill="white" opacity="0.6"/>
    <rect x="20" y="48" width="35" height="44" fill="white" opacity="0.6"/>
  </g>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Video Trimming</text>
</svg>
