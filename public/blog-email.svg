<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="emailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#emailGrad)"/>
  <g transform="translate(400, 185)">
    <!-- Envelope body -->
    <rect x="-90" y="-55" width="180" height="120" rx="6" fill="white" opacity="0.9"/>
    <!-- Envelope flap (V shape) -->
    <polyline points="-90,-55 0,-5 90,-55" fill="none" stroke="url(#emailGrad)" stroke-width="3" opacity="0.7"/>
    <!-- File attachment icon inside -->
    <rect x="-25" y="5" width="50" height="58" rx="4" fill="url(#emailGrad)" opacity="0.35"/>
    <rect x="-16" y="14" width="32" height="4" rx="2" fill="white" opacity="0.9"/>
    <rect x="-16" y="22" width="32" height="4" rx="2" fill="white" opacity="0.9"/>
    <rect x="-16" y="30" width="20" height="4" rx="2" fill="white" opacity="0.9"/>
    <!-- Down-arrow badge (reduce/compress) -->
    <circle cx="55" cy="-60" r="22" fill="white" opacity="0.9"/>
    <polyline points="55,-72 55,-50" stroke="url(#emailGrad)" stroke-width="4" stroke-linecap="round"/>
    <polyline points="45,-55 55,-45 65,-55" fill="none" stroke="url(#emailGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Email Video Size</text>
</svg>
